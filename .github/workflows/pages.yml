name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            dm/package-lock.json
            players/package-lock.json

      - name: Install DM dependencies
        run: npm ci
        working-directory: dm

      - name: Install Players dependencies
        run: npm ci
        working-directory: players

      - name: Build DM app for Pages
        run: VITE_BASE_PATH=/green-hunger-v7/dm/ npm run build
        working-directory: dm

      - name: Build Players app for Pages
        run: VITE_BASE_PATH=/green-hunger-v7/players/ npm run build
        working-directory: players

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/dm _site/players
          cp -R dm/dist/* _site/dm/
          cp -R players/dist/* _site/players/
          cp docs/landing-bg.png _site/landing-bg.png
          cp docs/icon.png _site/icon.png
          cp docs/icon.png _site/dm/icon.png
          cp docs/icon.png _site/players/icon.png
          python - <<'PY'
from pathlib import Path

def inject_icon(path: Path, href: str):
    if not path.exists():
        return
    html = path.read_text(encoding='utf-8')
    if 'rel="icon"' in html:
        return
    marker = '<head>'
    if marker in html:
        html = html.replace(marker, marker + f'\n    <link rel="icon" type="image/png" href="{href}" />', 1)
        path.write_text(html, encoding='utf-8')

inject_icon(Path('_site/dm/index.html'), './icon.png')
inject_icon(Path('_site/players/index.html'), './icon.png')
PY
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width,initial-scale=1" />
              <title>The Green Hunger</title>
              <link rel="icon" type="image/png" href="./icon.png" />
              <style>
                :root {
                  --bg-deep: #0a0f0c;
                  --bg-surface: rgba(16, 22, 18, 0.78);
                  --border: rgba(130, 166, 126, 0.35);
                  --text-primary: #e8efe7;
                  --text-muted: #9aa99a;
                  --green-bright: #8fd68a;
                  --green-mid: #5f9860;
                  --green-dim: rgba(90, 140, 86, 0.32);
                }
                * { box-sizing: border-box; }
                html, body { margin: 0; min-height: 100%; }
                body {
                  font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
                  color: var(--text-primary);
                  background:
                    linear-gradient(180deg, rgba(0,0,0,0.52), rgba(0,0,0,0.74)),
                    radial-gradient(1200px 700px at 50% 20%, rgba(70, 92, 80, 0.35), transparent 70%),
                    url('./landing-bg.png') center / cover no-repeat fixed,
                    var(--bg-deep);
                }
                .wrap {
                  min-height: 100vh;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  padding: 24px;
                }
                .panel {
                  width: min(560px, 100%);
                  background: var(--bg-surface);
                  border: 1px solid var(--border);
                  border-radius: 14px;
                  backdrop-filter: blur(3px);
                  box-shadow: 0 18px 60px rgba(0,0,0,0.45);
                  padding: 28px;
                }
                .eyebrow {
                  margin: 0 0 8px;
                  font-size: 11px;
                  letter-spacing: 0.14em;
                  text-transform: uppercase;
                  color: var(--text-muted);
                }
                h1 {
                  margin: 0 0 10px;
                  font-size: 34px;
                  letter-spacing: 0.06em;
                  line-height: 1.1;
                }
                .sub {
                  margin: 0 0 18px;
                  font-size: 14px;
                  color: var(--text-muted);
                }
                .grid {
                  display: grid;
                  gap: 12px;
                }
                .card {
                  display: block;
                  text-decoration: none;
                  padding: 14px 16px;
                  border: 1px solid var(--border);
                  border-radius: 10px;
                  background: rgba(30, 40, 33, 0.6);
                  color: var(--text-primary);
                  transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
                }
                .card:hover {
                  transform: translateY(-1px);
                  border-color: var(--green-mid);
                  background: rgba(38, 56, 43, 0.66);
                }
                .title {
                  font-size: 14px;
                  letter-spacing: 0.08em;
                  text-transform: uppercase;
                  color: var(--green-bright);
                  margin-bottom: 4px;
                }
                .desc {
                  font-size: 13px;
                  color: var(--text-muted);
                }
                .foot {
                  margin-top: 16px;
                  font-size: 12px;
                  color: var(--text-muted);
                }
                .error {
                  margin-top: 10px;
                  font-size: 12px;
                  color: #d67a7a;
                  min-height: 16px;
                }
              </style>
            </head>
            <body>
              <main class="wrap">
                <section class="panel">
                  <p class="eyebrow">The Green Hunger</p>
                  <h1>Choose Experience</h1>
                  <p class="sub">Launch the DM console or player app.</p>
                  <div class="grid">
                    <a class="card" id="dm-link" href="./dm/">
                      <div class="title">DM App</div>
                      <div class="desc">Run scenes, encounters, and combat control (password protected).</div>
                    </a>
                    <a class="card" href="./players/">
                      <div class="title">Player App</div>
                      <div class="desc">Character sheet, combat feed, and rolls.</div>
                    </a>
                  </div>
                  <div class="error" id="dm-error"></div>
                  <div class="foot">Tip: bookmark each app URL after first launch.</div>
                </section>
              </main>
              <script>
                (function () {
                  var DM_PASSWORD = 'Sherlock*123';
                  var TOKEN_KEY = 'gh_dm_unlocked';
                  var TOKEN_VALUE = 'ok';
                  var dmLink = document.getElementById('dm-link');
                  var errorEl = document.getElementById('dm-error');
                  if (!dmLink) return;
                  dmLink.addEventListener('click', function (e) {
                    var stored = localStorage.getItem(TOKEN_KEY);
                    if (stored === TOKEN_VALUE) return;
                    e.preventDefault();
                    var entered = window.prompt('DM password required');
                    if (entered === DM_PASSWORD) {
                      localStorage.setItem(TOKEN_KEY, TOKEN_VALUE);
                      window.location.href = './dm/';
                    } else if (entered != null) {
                      if (errorEl) errorEl.textContent = 'Incorrect DM password.';
                    }
                  });
                })();
              </script>
            </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

